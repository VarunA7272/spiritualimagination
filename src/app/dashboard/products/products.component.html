<section id="products" class="products-bg">
  <div class="container">
    <div class="text-center fade-up">
      <span class="section-tag">Our Creations</span>
      <h2 class="section-title">What We Create 🎨</h2>
      <p class="section-sub">From photo mugs to custom-cut name plates — explore our personalized creations below.</p>
    </div>

    <!-- Category Filter Tabs -->
    <div class="category-tabs fade-up">
      <button 
        *ngFor="let cat of categories" 
        [class.active]="selectedCategory === cat" 
        (click)="filterByCategory(cat)">
        {{ cat }}
      </button>
    </div>

    <!-- Products Grid -->
    <div class="products-grid">
      <div class="product-card fade-up" *ngFor="let p of filteredProducts">
        <div class="product-img">
          <div class="cam-icon">{{ p.icon }}</div>
          <div class="img-label">Code: {{ p.code }}</div>
        </div>
        <div class="product-info">
          <div class="product-header-row">
            <span class="product-category-tag">{{ p.category }}</span>
            <span class="product-price">{{ p.price }}</span>
          </div>
          <div class="product-name">{{ p.name }}</div>
          <div class="product-desc">{{ p.desc }}</div>
          <div class="product-meta">Size: {{ p.size }}</div>
          <a [href]="getWhatsAppLink(p.name, p.code)" class="btn-quote" target="_blank">
            💬 Order on WhatsApp
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
