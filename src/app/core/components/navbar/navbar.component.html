<nav id="navbar">
  <div class="nav-inner">
    <a routerLink="/dashboard/home" class="nav-logo">Spiritual Imagination 🎁</a>
    <ul class="nav-links" id="navLinks">
      <li><a routerLink="/dashboard/home" routerLinkActive="active">Home</a></li>
      <li><a routerLink="/dashboard/products" routerLinkActive="active">Products</a></li>
      <li><a routerLink="/dashboard/about" routerLinkActive="active">About</a></li>
      <li><a routerLink="/dashboard/reviews" routerLinkActive="active">Reviews</a></li>
      <li><a routerLink="/dashboard/contact" routerLinkActive="active">Contact</a></li>
      <li class="user-info-item" *ngIf="userEmail">
        <span class="user-email-text" title="{{ userEmail }}">{{ userEmail.split('@')[0] }}</span>
        <button class="btn-logout-nav" (click)="logout()">Sign Out</button>
      </li>
    </ul>
    <div class="hamburger" id="hamburger" [class.open]="mobileMenuOpen" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu" [class.open]="mobileMenuOpen">
  <a routerLink="/dashboard/home" routerLinkActive="active" (click)="closeMobileMenu()">Home</a>
  <a routerLink="/dashboard/products" routerLinkActive="active" (click)="closeMobileMenu()">Products</a>
  <a routerLink="/dashboard/about" routerLinkActive="active" (click)="closeMobileMenu()">About</a>
  <a routerLink="/dashboard/reviews" routerLinkActive="active" (click)="closeMobileMenu()">Reviews</a>
  <a routerLink="/dashboard/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact</a>
  <div class="mobile-user-actions" *ngIf="userEmail">
    <span class="mobile-user-email">{{ userEmail }}</span>
    <button class="btn-logout-mobile" (click)="logout()">Sign Out</button>
  </div>
</div>
